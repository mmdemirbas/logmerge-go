version: "2"

linters:
  default: none
  enable:
    # Correctness
    - errcheck      # unchecked errors
    - govet         # go vet
    - staticcheck   # semantic analysis (SA*, S*, ST*, QF*)
    # Security
    - gosec         # OWASP-aligned security checks
    # Complexity
    - gocognit      # cognitive complexity (nesting-aware)
    - cyclop        # cyclomatic complexity
    - funlen        # function length
    # Quality
    - gocritic      # style and correctness patterns
    - unused        # unused code

  exclusions:
    rules:
      # Table-driven tests are idiomatic Go and naturally long.
      # funlen and cyclop measure production-code complexity, not test complexity.
      - path: "_test\\.go"
        linters:
          - funlen
          - cyclop

  settings:
    errcheck:
      exclude-functions:
        # Writing to stdout/stderr/log writers in a CLI is intentionally fire-and-forget.
        # A broken stdout/stderr is not recoverable — checking these errors adds noise.
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
    gocognit:
      min-complexity: 15
    cyclop:
      max-complexity: 10
    funlen:
      lines: 80
      statements: 60
    gosec:
      excludes:
        - G115  # integer overflow on conversion — too noisy for systems code
        - G304  # file inclusion via variable — this tool's purpose is to open files by path
        - G204  # subprocess launched with variable — only used in integration tests for the built binary
