version: '3'

vars:
  BINARY_NAME: logmerge
  BIN_DIR: build
  DIST_DIR: dist
  OUT_DIR: out
  CPU_PROF_FILE: cpu.prof
  MEM_PROF_FILE: mem.prof
  TRACE_FILE: trace.out

env:
  # Statically link binaries globally
  CGO_ENABLED: '0'

tasks:
  default:
    desc: "List all available tasks"
    cmds:
      - task -l

  all:
    desc: "Clean, test, and build the project"
    cmds:
      - task: clean
      - task: test
      - task: build

  clean:
    desc: "Clean build artifacts and profiling data"
    cmds:
      - rm -rf {{.BIN_DIR}} {{.OUT_DIR}}
      - rm -rf {{.DIST_DIR}} {{.OUT_DIR}}

  build:
    desc: "Build the binary for the current OS"
    sources:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
    generates:
      - "{{.BIN_DIR}}/{{.BINARY_NAME}}{{exeExt}}"
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -ldflags="-s -w" -o {{.BIN_DIR}}/{{.BINARY_NAME}}{{exeExt}} ./cmd/logmerge

  build-pgo:
    desc: "Build the binary for the current OS with PGO"
    deps: [ check-pgo ]
    sources:
      - "**/*.go"
      - "{{.OUT_DIR}}/{{.CPU_PROF_FILE}}"
    generates:
      - "{{.BIN_DIR}}/{{.BINARY_NAME}}-pgo{{exeExt}}"
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -pgo={{.OUT_DIR}}/{{.CPU_PROF_FILE}} -ldflags="-s -w" -o {{.BIN_DIR}}/{{.BINARY_NAME}}-pgo{{exeExt}} ./cmd/logmerge

  dist:
    desc: "Cross-compile binaries with PGO for all target platforms"
    deps: [ check-pgo ]
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - for:
          matrix:
            os: [ darwin, linux, windows ]
            arch: [ amd64, arm64 ]
        cmd:
          GOOS={{.ITEM.os}} GOARCH={{.ITEM.arch}} go build -pgo={{.OUT_DIR}}/{{.CPU_PROF_FILE}} -ldflags="-s -w" -o {{.DIST_DIR}}/{{.BINARY_NAME}}-pgo-{{.ITEM.os}}-{{.ITEM.arch}}{{if eq .ITEM.os "windows"}}.exe{{end}} ./cmd/logmerge

  test-unit:
    desc: "Run unit tests"
    cmds:
      - go test -v -count=1 -run 'Test[^I]' ./...

  test-integration:
    desc: "Run integration tests"
    cmds:
      - go test -v -count=1 -run TestIntegration ./...

  test:
    desc: "Run all tests"
    cmds:
      - go test -v -count=1 ./...

  benchmark:
    desc: "Run benchmark tests and capture CPU and memory profiles"
    cmds:
      - mkdir -p {{.OUT_DIR}}
      - go test -bench=. -benchmem ./internal/core/ -run=^$ -benchtime=5s -cpuprofile={{.OUT_DIR}}/{{.CPU_PROF_FILE}} -memprofile={{.OUT_DIR}}/{{.MEM_PROF_FILE}} -trace={{.OUT_DIR}}/{{.TRACE_FILE}}
      - mv core.test {{.OUT_DIR}}/core.test || true

  profile:
    desc: "Run benchmark and immediately open CPU flame graph"
    cmds:
      - task: benchmark
      - task: inspect-cpu

  run:
    desc: "Run the application locally"
    vars:
      CONF_FILE: '{{default "conf/default.yaml" .CONF_FILE}}'
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -ldflags="-s -w" -o {{.BIN_DIR}}/{{.BINARY_NAME}}{{exeExt}} ./cmd/logmerge
      - "{{.BIN_DIR}}/{{.BINARY_NAME}}{{exeExt}} {{.CONF_FILE}}"

  trace:
    desc: "Run the application with GC tracing enabled"
    vars:
      CONF_FILE: '{{default "conf/default.yaml" .CONF_FILE}}'
    env:
      GODEBUG: gctrace=1
    cmds:
      - task: run
        vars:
          CONF_FILE: '{{.CONF_FILE}}'

  inspect-cpu:
    desc: "Browse captured CPU profile in a web browser"
    cmds:
      - go tool pprof -http=:8080 {{.OUT_DIR}}/{{.CPU_PROF_FILE}} & sleep 2 && open http://localhost:8080/ui/flamegraph

  inspect-mem:
    desc: "Browse captured memory profile in a web browser"
    cmds:
      - go tool pprof -http=:8080 {{.OUT_DIR}}/{{.MEM_PROF_FILE}}

  inspect-trace:
    desc: "View execution trace"
    cmds:
      - echo "Launching trace viewer..."
      - go tool trace {{.OUT_DIR}}/{{.TRACE_FILE}}

  inspect-cpu-interactive:
    desc: "Browse captured CPU profile in an interactive shell"
    cmds:
      - go tool pprof {{.OUT_DIR}}/{{.CPU_PROF_FILE}}

  inspect-mem-interactive:
    desc: "Browse captured memory profile in an interactive shell"
    cmds:
      - go tool pprof {{.OUT_DIR}}/{{.MEM_PROF_FILE}}

  install-completions:
    desc: "Install shell completions for the current shell (bash, zsh, fish, or powershell)"
    deps: [ build ]
    cmds:
      - |
        SHELL_NAME=$(basename "$SHELL")
        case "$SHELL_NAME" in
          bash)
            DIR="${BASH_COMPLETION_USER_DIR:-${XDG_DATA_HOME:-$HOME/.local/share}/bash-completion/completions}"
            mkdir -p "$DIR"
            {{.BIN_DIR}}/{{.BINARY_NAME}} --completions bash > "$DIR/logmerge"
            echo "Installed bash completions to $DIR/logmerge"
            echo "Restart your shell or run: source $DIR/logmerge"
            ;;
          zsh)
            DIR="${XDG_DATA_HOME:-$HOME/.local/share}/zsh/site-functions"
            mkdir -p "$DIR"
            {{.BIN_DIR}}/{{.BINARY_NAME}} --completions zsh > "$DIR/_logmerge"
            echo "Installed zsh completions to $DIR/_logmerge"
            echo "Add $DIR to your fpath in .zshrc if not already:"
            echo "  fpath=($DIR \$fpath)"
            echo "Then restart your shell or run: autoload -Uz compinit && compinit"
            ;;
          fish)
            DIR="${XDG_CONFIG_HOME:-$HOME/.config}/fish/completions"
            mkdir -p "$DIR"
            {{.BIN_DIR}}/{{.BINARY_NAME}} --completions fish > "$DIR/logmerge.fish"
            echo "Installed fish completions to $DIR/logmerge.fish"
            ;;
          *)
            echo "Unsupported shell: $SHELL_NAME (supported: bash, zsh, fish)"
            echo "For PowerShell, run: task install-completions-powershell"
            exit 1
            ;;
        esac

  install-completions-powershell:
    desc: "Install PowerShell completions for logmerge"
    deps: [ build ]
    platforms: [ windows, darwin, linux ]
    cmds:
      - |
        {{.BIN_DIR}}/{{.BINARY_NAME}} --completions powershell > "{{.BIN_DIR}}/logmerge.ps1"
        echo "Generated PowerShell completions to {{.BIN_DIR}}/logmerge.ps1"
        echo ""
        echo "To load in the current session:"
        echo "  . {{.BIN_DIR}}/logmerge.ps1"
        echo ""
        echo "To load automatically, add this line to your PowerShell profile"
        echo "(\$PROFILE, typically ~\\Documents\\PowerShell\\Microsoft.PowerShell_profile.ps1):"
        echo "  . $(pwd)/{{.BIN_DIR}}/logmerge.ps1"

  check-pgo:
    internal: true
    cmds:
      - |
        if [ ! -f {{.OUT_DIR}}/{{.CPU_PROF_FILE}} ]; then
          echo "Error: {{.OUT_DIR}}/{{.CPU_PROF_FILE}} not found. Run 'task benchmark' first."
          exit 1
        fi
